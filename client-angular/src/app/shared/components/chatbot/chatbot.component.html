<!-- Floating AI Chat Assistant -->
<div
  class="chatbot-root"
  [class.chatbot-root--open]="isOpen"
  [class.chatbot-root--minimized]="isMinimized"
  [class.chatbot-root--expanded]="isExpanded">

  <!-- ===================== Floating Action Button ===================== -->
  <button
    *ngIf="!isOpen || isMinimized"
    type="button"
    class="chatbot-fab"
    [class.chatbot-fab--active]="isOpen || isMinimized"
    (click)="toggle()"
    aria-label="Open NEXORA AI Assistant">
    <svg
      *ngIf="!isOpen"
      class="chatbot-fab__icon"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true">
      <path
        d="M12 2a9 9 0 0 0-9 9c0 1.79.53 3.46 1.44 4.86L3 21l5.27-1.4A9 9 0 1 0 12 2Zm-3.5 8.25a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Zm3.5 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Zm3.5 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Z"
        fill="currentColor"/>
    </svg>
    <svg
      *ngIf="isOpen"
      class="chatbot-fab__icon"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true">
      <path
        d="M6 6l12 12M18 6L6 18"
        stroke="currentColor"
        stroke-width="2.2"
        stroke-linecap="round"/>
    </svg>
    <span class="chatbot-fab__pulse" aria-hidden="true"></span>
  </button>

  <!-- ===================== Chatbot Panel ===================== -->
  <section
    class="chatbot-panel"
    role="dialog"
    aria-label="NEXORA AI Assistant"
    *ngIf="isOpen || isMinimized"
    [class.chatbot-panel--minimized]="isMinimized"
    [class.chatbot-panel--expanded]="isExpanded">

    <!-- Header -->
    <header class="chatbot-header">
      <div class="chatbot-header__brand">
        <div class="chatbot-header__avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2 4 6v6c0 5 3.4 9.3 8 10 4.6-.7 8-5 8-10V6l-8-4Z"
              fill="currentColor" opacity=".15"/>
            <path
              d="M9 11h6M9 14h4M12 8v.01"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path
              d="M12 2 4 6v6c0 5 3.4 9.3 8 10 4.6-.7 8-5 8-10V6l-8-4Z"
              stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </div>
        <div class="chatbot-header__titles">
          <h3 class="chatbot-header__title">NEXORA Assistant</h3>
          <div class="chatbot-header__status">
            <span class="chatbot-header__dot" aria-hidden="true"></span>
            <span>Online</span>
          </div>
        </div>
      </div>

      <div class="chatbot-header__actions">
        <button
          type="button"
          class="chatbot-icon-btn"
          (click)="minimize()"
          [attr.aria-label]="isMinimized ? 'Restore' : 'Minimize'"
          title="Minimize">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 13h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button
          type="button"
          class="chatbot-icon-btn"
          (click)="toggleExpand()"
          [attr.aria-label]="isExpanded ? 'Collapse' : 'Expand'"
          title="Expand">
          <svg viewBox="0 0 24 24" aria-hidden="true" *ngIf="!isExpanded">
            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
          <svg viewBox="0 0 24 24" aria-hidden="true" *ngIf="isExpanded">
            <path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
        </button>
        <button
          type="button"
          class="chatbot-icon-btn chatbot-icon-btn--danger"
          (click)="close()"
          aria-label="Close"
          title="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Body (hidden when minimized) -->
    <div class="chatbot-body" *ngIf="!isMinimized">

      <!-- Messages / Welcome -->
      <div class="chatbot-messages" #messagesContainer>

        <!-- Welcome / empty state -->
        <ng-container *ngIf="messages.length === 0; else messagesTpl">
          <div class="chatbot-welcome">
            <div class="chatbot-welcome__icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="nexoraGrad" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0%" stop-color="#6366f1"/>
                    <stop offset="100%" stop-color="#8b5cf6"/>
                  </linearGradient>
                </defs>
                <circle cx="32" cy="32" r="30" fill="url(#nexoraGrad)" opacity=".12"/>
                <circle cx="32" cy="32" r="20" fill="url(#nexoraGrad)"/>
                <path
                  d="M24 30h16M24 36h10"
                  stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                <circle cx="32" cy="22" r="2.4" fill="#fff"/>
              </svg>
            </div>
            <h2 class="chatbot-welcome__title">
              Have a Good Day,
              <span class="chatbot-welcome__name">{{ username }}</span>
            </h2>
            <p class="chatbot-welcome__subtitle">
              Try <strong>NEXORA</strong>, Your AI Companion
            </p>

            <!-- Suggested prompts -->
            <div class="chatbot-suggestions">
              <button
                type="button"
                class="chatbot-suggestion"
                *ngFor="let p of suggestedPrompts"
                (click)="usePrompt(p)">
                <svg class="chatbot-suggestion__icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M13 3 4 14h7l-1 7 9-11h-7l1-7Z"
                    fill="currentColor" opacity=".15"/>
                  <path
                    d="M13 3 4 14h7l-1 7 9-11h-7l1-7Z"
                    stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
                </svg>
                <span>{{ p.label }}</span>
              </button>
            </div>
          </div>
        </ng-container>

        <!-- Message list -->
        <ng-template #messagesTpl>
          <ul class="chatbot-thread">
            <li
              *ngFor="let m of messages; trackBy: trackById"
              class="chatbot-msg"
              [class.chatbot-msg--user]="m.role === 'user'"
              [class.chatbot-msg--assistant]="m.role === 'assistant'">

              <div class="chatbot-msg__avatar" *ngIf="m.role === 'assistant'" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="11" fill="currentColor" opacity=".12"/>
                  <path
                    d="M9 11h6M9 14h4"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </div>

              <div class="chatbot-msg__bubble">
                <div
                  class="chatbot-msg__content"
                  *ngIf="m.role === 'assistant'; else userContent"
                  [innerHTML]="renderMarkdown(m.content)">
                </div>
                <ng-template #userContent>
                  <div class="chatbot-msg__content">{{ m.content }}</div>
                </ng-template>
                <div class="chatbot-msg__meta">
                  {{ m.timestamp | date:'shortTime' }}
                </div>
              </div>
            </li>

            <!-- Typing indicator -->
            <li *ngIf="isTyping" class="chatbot-msg chatbot-msg--assistant chatbot-msg--typing">
              <div class="chatbot-msg__avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="11" fill="currentColor" opacity=".12"/>
                  <path d="M9 11h6M9 14h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="chatbot-msg__bubble">
                <div class="chatbot-typing" aria-label="Assistant is typing">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </li>
          </ul>
        </ng-template>
      </div>

      <!-- Input -->
      <div class="chatbot-input">
        <div class="chatbot-input__row">
          <button type="button" class="chatbot-input__icon-btn" title="Attach file" aria-label="Attach file">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="m21 12-8.5 8.5a5 5 0 0 1-7-7L14 5a3.5 3.5 0 1 1 5 5l-8.5 8.5a2 2 0 1 1-3-3L15 8"
                stroke="currentColor" stroke-width="1.7" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" class="chatbot-input__icon-btn" title="Add image" aria-label="Add image">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"
                    stroke="currentColor" stroke-width="1.7" fill="none"/>
              <circle cx="9" cy="11" r="1.6" fill="currentColor"/>
              <path d="m21 17-5-5-7 7" stroke="currentColor" stroke-width="1.7" fill="none"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <textarea
            #inputArea
            class="chatbot-input__textarea"
            placeholder="Ask NEXORA anything…"
            rows="1"
            [(ngModel)]="draft"
            (keydown)="onInputKeydown($event)"
            (input)="autoSizeTextarea()"
            [disabled]="isTyping"></textarea>

          <button type="button" class="chatbot-input__icon-btn" title="Voice input" aria-label="Voice input">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="3" width="6" height="12" rx="3"
                    stroke="currentColor" stroke-width="1.7" fill="none"/>
              <path d="M5 11a7 7 0 0 0 14 0M12 18v3"
                    stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/>
            </svg>
          </button>

          <button
            type="button"
            class="chatbot-input__send"
            [disabled]="!draft.trim() || isTyping"
            (click)="send()"
            aria-label="Send message"
            title="Send">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 11.5 21 3l-8.5 18-2-7.5L3 11.5Z"
                    fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div class="chatbot-input__hint">
          Press <kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for newline
        </div>
      </div>
    </div>
  </section>
</div>
