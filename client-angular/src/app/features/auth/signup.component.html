    <div class="signup-card">
      <h1>Sign Up</h1>
      <app-error-message [message]="errorMessage"></app-error-message>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="Choose a username"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="Enter your email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="Enter your password"
            />
            <button type="button" class="toggle-password" (click)="togglePasswordVisibility('password')">
              <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-input-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              formControlName="confirmPassword"
              placeholder="Confirm your password"
            />
            <button type="button" class="toggle-password" (click)="togglePasswordVisibility('confirm')">
              <mat-icon>{{ showConfirmPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
          </div>
          <div *ngIf="passwordMismatchError" class="error">
            {{ passwordMismatchError }}
          </div>
        </div>

        <button type="submit" [disabled]="signupForm.invalid || isLoading">
          {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
        </button>
      </form>

      <p class="signin-link">
        Already have an account? <a routerLink="/auth/signin">Sign in</a>
      </p>
    </div>
