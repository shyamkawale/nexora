    <div class="app-container">
      <!-- Loading screen while auth initializes -->
      <div class="auth-loading" *ngIf="isInitializing$ | async">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>

      <ng-container *ngIf="!(isInitializing$ | async)">
        <nav class="navbar" *ngIf="isAuthenticated$ | async">
          <div class="nav-brand">
            <h2>Nexora</h2>
          </div>
          <ul class="nav-menu">
            <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
            <li><a routerLink="/organizations" routerLinkActive="active">Organizations</a></li>
            <ng-container *ngIf="activeOrganization$ | async">
              <li><a routerLink="/feed" routerLinkActive="active">Feed</a></li>
              <li><a routerLink="/chat" routerLinkActive="active">Chat</a></li>
              <li><a routerLink="/people" routerLinkActive="active">People</a></li>
            </ng-container>
            <li><a routerLink="/settings" routerLinkActive="active">Settings</a></li>
            <li *ngIf="isAdmin$ | async"><a routerLink="/admin/dashboard" routerLinkActive="active" class="admin-link">👨‍💼 Admin Dashboard</a></li>
          </ul>
          <div class="org-switcher" *ngIf="approvedOrganizations$ | async as organizations">
            <select
              *ngIf="organizations.length > 0"
              [value]="(activeOrganization$ | async)?.publicId || ''"
              (change)="onOrganizationChange($event)"
              aria-label="Active organization">
              <option *ngFor="let org of organizations" [value]="org.publicId">{{ org.name }}</option>
            </select>
            <a *ngIf="organizations.length === 0" routerLink="/organizations" class="org-empty">Choose org</a>
          </div>
          <div class="nav-user-info" (click)="navigateToProfile()" routerLink="/user">
            <div class="user-avatar">👤</div>
            <div class="user-details" *ngIf="currentUser$ | async as user">
              <div class="user-greeting">Hey {{ user.username || user.email }}</div>
              <div class="user-email">{{ user.email }}</div>
            </div>
          </div>
          <div class="nav-actions">
            <button (click)="logout()" class="logout-btn">Logout</button>
          </div>
        </nav>

        <main class="main-content">
          <router-outlet></router-outlet>
        </main>

        <!-- Floating NEXORA AI Assistant (visible only when signed in) -->
        <app-chatbot *ngIf="isAuthenticated$ | async"></app-chatbot>
      </ng-container>
    </div>
