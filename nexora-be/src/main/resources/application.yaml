spring:
  application:
    name: nexora-be

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/svk-db?currentSchema=nexora_db}
    username: ${DB_USERNAME:svk}
    password: ${DB_PASSWORD:svk}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION:ap-south-1}
    bucket-name: ${AWS_BUCKET_NAME}
    presigned-url-expiration-minutes: ${AWS_PRESIGNED_EXPIRATION:15}
    max-file-size-mb: ${AWS_MAX_FILE_SIZE:50}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /